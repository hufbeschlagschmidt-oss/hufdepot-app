<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HufDepot</title>

<style>
body { font-family: Arial; margin:0; padding:15px; background:#f4f4f4; }
h1 { text-align:center; }

.section { margin-bottom:20px; }

.box {
  background:white;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.low { border-left:6px solid red; }
.order { border-left:6px solid orange; }
.wait { border-left:6px solid blue; }

input {
  width:100%;
  padding:8px;
  margin:5px 0;
}

button {
  padding:8px;
  margin:3px;
}

/* POPUP */
.popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popup-content {
  background:white;
  padding:20px;
  border-radius:10px;
  width:80%;
  max-width:300px;
  text-align:center;
}
</style>
</head>

<body>

<h1>🐴 HufDepot</h1>

<div class="section">

<input id="name" placeholder="z.B. Mustad RX 7">
<input id="cat" placeholder="Hersteller / Typ">
<input id="stock" type="number" placeholder="Start Werkstatt Bestand">
<input id="min" type="number" placeholder="Mindestbestand">

<button type="button" onclick="add()">Hinzufügen</button>

</div>

<!-- 📦 BESTELLEN -->
<div class="section">
<h2>📦 Bestellen</h2>
<div id="orderList"></div>
</div>

<!-- 🚚 ERWARTET -->
<div class="section">
<h2>🚚 Erwartet</h2>
<div id="waitingList"></div>
</div>

<!-- 📦 BESTAND -->
<div class="section">
<h2>📦 Bestand</h2>
<div id="list"></div>
</div>

<!-- 🚚 POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>🚚 Eingang buchen</h3>
    <p id="popupText"></p>

    <input id="popupInput" type="number" placeholder="Anzahl angekommen">

    <br><br>

    <button onclick="confirmReceive()">Bestätigen</button>
    <button onclick="closePopup()">Abbrechen</button>
  </div>
</div>

<script>

let items = JSON.parse(localStorage.getItem("hufdepot_flow")) || [];

let currentItemId = null;

function save(){
  localStorage.setItem("hufdepot_flow", JSON.stringify(items));
}

/* ➕ ADD */
function add(){

  let name = document.getElementById("name").value.trim();
  let cat = document.getElementById("cat").value.trim();
  let stock = parseInt(document.getElementById("stock").value);
  let min = parseInt(document.getElementById("min").value);

  if(!name) return;

  if(isNaN(stock)) stock = 0;
  if(isNaN(min)) min = 0;

  let id = name.toLowerCase().replace(/\s+/g, "_");

  items.push({
    id,
    name,
    cat,
    min,
    werkstatt: stock,
    auto: 0,
    ordered:false,
    expected:false
  });

  save();
  render();

  document.getElementById("name").value = "";
  document.getElementById("cat").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("min").value = "";
}

/* TOTAL */
function total(i){
  return i.werkstatt + i.auto;
}

/* 🔥 VERBRAUCH NEU (AUTO FIRST) */
function use(id,val){

  let i = items.find(x => x.id === id);

  if(!i) return;

  let remaining = val;

  // 1️⃣ zuerst Auto
  if(i.auto >= remaining){
    i.auto -= remaining;
    remaining = 0;
  } else {
    remaining -= i.auto;
    i.auto = 0;
  }

  // 2️⃣ Rest aus Werkstatt
  if(remaining > 0){
    i.werkstatt -= remaining;
    if(i.werkstatt < 0) i.werkstatt = 0;
  }

  save();
  render();
}

/* 📦 BESTELLT → ERWARTET */
function markOrdered(id){
  let i = items.find(x => x.id === id);
  i.ordered = true;
  i.expected = true;
  save();
  render();
}

/* 🚚 POPUP */
function received(id){

  currentItemId = id;

  let item = items.find(x => x.id === id);

  document.getElementById("popupText").innerText =
    item.name + " (" + item.cat + ")";

  document.getElementById("popupInput").value = "";

  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
  currentItemId = null;
}

/* 📦 EINGANG */
function confirmReceive(){

  let amount = parseInt(document.getElementById("popupInput").value);

  if(isNaN(amount) || amount <= 0) return;

  let i = items.find(x => x.id === currentItemId);

  i.werkstatt += amount;
  i.expected = false;
  i.ordered = false;

  save();
  render();

  closePopup();
}

/* 🔁 WERKSTATT → AUTO */
function moveToAuto(id, amount){

  amount = parseInt(amount);
  if(isNaN(amount) || amount <= 0) return;

  let i = items.find(x => x.id === id);
  if(!i) return;

  if(i.werkstatt < amount) return;

  i.werkstatt -= amount;
  i.auto += amount;

  save();
  render();
}

/* ❌ DELETE */
function removeItem(id){
  items = items.filter(x => x.id !== id);
  save();
  render();
}

/* 📦 RENDER */
function render(){

  let list = document.getElementById("list");
  let order = document.getElementById("orderList");
  let wait = document.getElementById("waitingList");

  list.innerHTML = "";
  order.innerHTML = "";
  wait.innerHTML = "";

  items.forEach(i => {

    let t = total(i);

    let div = document.createElement("div");

    let cls = "box ";
    if(i.expected) cls += "wait";
    else if(t <= i.min) cls += "low";

    div.className = cls;

    div.innerHTML = `
      <b>${i.name}</b> (${i.cat})<br><br>

      🔧 Werkstatt: <b>${i.werkstatt}</b><br>
      🚗 Auto: <b>${i.auto}</b><br>
      📦 Gesamt: <b>${t}</b><br>
      📉 Min: <b>${i.min}</b><br><br>

      <b>Verbrauch:</b><br>
      <button onclick="use('${i.id}',1)">-1</button>
      <button onclick="use('${i.id}',4)">-4</button>

      <br><br>

      <b>Umlagern:</b><br>
      <button onclick="moveToAuto('${i.id}',1)">→ 1 ins Auto</button>
      <button onclick="moveToAuto('${i.id}',2)">→ 2 ins Auto</button>
      <button onclick="moveToAuto('${i.id}',5)">→ 5 ins Auto</button>

      <br><br>

      ${t <= i.min && !i.ordered ? `
        <button onclick="markOrdered('${i.id}')">📦 Bestellt</button>
      ` : ""}

      ${i.expected ? `
        <button style="background:green;color:white"
                onclick="received('${i.id}')">
          🚚 Eingang
        </button>
      ` : ""}

      <br><br>

      <button style="background:red;color:white"
              onclick="removeItem('${i.id}')">
        ❌ Löschen
      </button>
    `;

    list.appendChild(div);

    if(t <= i.min && !i.ordered){
      let w = document.createElement("div");
      w.className = "box order";
      w.innerHTML = `📦 ${i.name} → BESTELLEN`;
      order.appendChild(w);
    }

    if(i.expected){
      let e = document.createElement("div");
      e.className = "box wait";
      e.innerHTML = `🚚 ${i.name} → UNTERWEGS`;
      wait.appendChild(e);
    }

  });
}

render();

</script>

</body>
</html>
